{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white text-center py-3">
                <h4 class="mb-0">🔐 เข้าสู่ระบบ</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">ชื่อผู้ใช้งาน (Username)</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="กรอกชื่อผู้ใช้งาน">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">รหัสผ่าน (Password)</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="กรอกรหัสผ่าน">
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-3">เข้าสู่ระบบ</button>
                </form>
                <div class="text-center mt-4">
                    <span class="text-muted">ยังไม่มีบัญชี?</span> 
                    <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">สมัครสมาชิกที่นี่</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
